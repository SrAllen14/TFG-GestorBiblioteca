<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mantenimiento de Préstamos</title>

    <!-- Bootstrap CSS -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/">
            Mantenimiento de Préstamos
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="/libro">
                        Préstamo
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/">
                        Inicio
                    </a>
                </li>

            </ul>

        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="container py-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1 class="fw-bold">
            Mantenimiento de Prestamos
        </h1>

        <a th:href="@{/prestamo/registro}"
           class="btn btn-primary">
            <i class="bi bi-plus-circle"></i>
            Nuevo Préstamo
        </a>

    </div>

    <!-- FILTRO -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">

            <form th:action="@{/prestamo}"
                  method="get"
                  class="row g-3">

                <div class="col-md-5">
                    <input type="text"
                           name="busqueda"
                           placeholder="Buscar prestamo..."
                           th:value="${busqueda}"
                           class="form-control">
                </div>

                <div class="col-md-3">
                    <select name="activo"
                            class="form-select">

                        <option value=""
                                th:selected="${activo == null}">
                            Todos
                        </option>

                        <option value="true"
                                th:selected="${activo == 'true'}">
                            Activos
                        </option>

                        <option value="false"
                                th:selected="${activo == 'false'}">
                            Inactivos
                        </option>

                    </select>
                </div>

                <div class="col-md-auto">
                    <button type="submit"
                            class="btn btn-primary">
                        <i class="bi bi-search"></i>
                        Buscar
                    </button>
                </div>

            </form>

        </div>
    </div>

    <!-- TABLA -->
    <div class="card shadow-sm border-0">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">

                    <tr>
                        <th>Usuario</th>
                        <th>Libro</th>
                        <th>Código Ejemplar</th>
                        <th>Fecha Inicio</th>
                        <th>Fecha Fin</th>
                        <th>Fecha Devolución</th>
                        <th>Estado</th>
                        <th class="text-center">
                            Acciones
                        </th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="prestamo : ${prestamos}">

                        <td th:text="${prestamo.usuario.nombre}"></td>

                        <td th:text="${prestamo.ejemplar.libro.titulo} + ' - ' + ${prestamo.ejemplar.libro.editorial}"></td>
                        
                        <td th:text="${prestamo.ejemplar.codigo}"></td>

                        <td th:text="${#temporals.format(prestamo.fechaInicio, 'dd-MM-yyyy')}"></td>

                        <td th:text="${#temporals.format(prestamo.fechaFin, 'dd-MM-yyyy')}"></td>

                        <td th:if="${prestamo.fechaDevolucion != null}" th:text="${#temporals.format(prestamo.fechaDevolucion, 'dd-MM-yyyy')}"></td>
                        <td th:if="${prestamo.fechaDevolucion == null}">No se ha devuelto</td>

                        
                        <td th:text="${prestamo.fechaDevolucion} == null ? Activo : Devuelto"></td>
                        <td>

                            <div class="d-flex gap-2 justify-content-center">

                                <!-- EDITAR -->
                                <a th:href="@{/prestamo/editar/{id}(id=${prestamo.idPrestamo})}"
                                   class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil-square"></i>
                                </a>
                                <a th:href="@{/prestamo/consultar/{id}(id=${prestamo.idPrestamo})}"
                                   class="btn btn-info btn-sm text-white">

                                    <i class="bi bi-eye"></i>

                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- PAGINACIÓN -->
    <div class="d-flex justify-content-center align-items-center gap-3 mt-4">

        <a class="btn btn-outline-dark"
           th:if="${pagina.hasPrevious()}"
           th:href="@{/prestamo(
                page=${pagina.number - 1},
                busqueda=${busqueda}
           )}">

            <i class="bi bi-arrow-left"></i>
            Anterior

        </a>

        <span class="fw-bold fs-5"
              th:text="${pagina.number + 1}">
        </span>

        <a class="btn btn-outline-dark"
           th:if="${pagina.hasNext()}"
           th:href="@{/prestamo(
                page=${pagina.number + 1},
                busqueda=${busqueda}
           )}">

            Siguiente
            <i class="bi bi-arrow-right"></i>

        </a>

    </div>

    <!-- BOTÓN INICIO -->
    <div class="text-center mt-5">

        <a href="/"
           class="btn btn-dark">

            <i class="bi bi-house"></i>
            Inicio

        </a>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
