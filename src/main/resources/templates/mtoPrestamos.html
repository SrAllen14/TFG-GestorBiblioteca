<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mantenimiento Préstamos</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th{
            background-color: lightgray;
        }

        .boton{
            padding: 10px 15px;
            background-color: #2d89ef;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

    </style>

</head>
<body>

    <h1>Mantenimiento de Préstamos</h1>

    <a th:href="@{/}" class="boton">
        Volver al inicio
    </a>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Ejemplar</th>
                <th>Fecha préstamo</th>
                <th>Fecha devolución</th>
                <th>Estado</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="prestamo : ${prestamos}">

                <td th:text="${prestamo.idPrestamo}"></td>

                <td th:text="${prestamo.usuario.nombre}"></td>

                <td th:text="${prestamo.ejemplar.codigo}"></td>

                <td th:text="${prestamo.fechaPrestamo}"></td>

                <td th:text="${prestamo.fechaDevolucion}"></td>

                <td>
                    <span th:if="${prestamo.devuelto}">
                        Devuelto
                    </span>

                    <span th:unless="${prestamo.devuelto}">
                        Prestado
                    </span>
                </td>

            </tr>

        </tbody>

    </table>

</body>
</html>
