<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mantenimiento Préstamos</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th{
            background-color: lightgray;
        }

        .boton{
            padding: 10px 15px;
            background-color: #2d89ef;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

    </style>

</head>
<body>

    <h1>Mantenimiento de Préstamos</h1>

    <a th:href="@{/}" class="boton">
        Volver al inicio
    </a>
    <a th:href="@{/prestamo/registro}" class="boton">
        Registrar Prestamo
    </a>
    
    <br>
    <br>
    <form th:action="@{/prestamo}"
          method="get">
        <input type="text"
               name="codigo"
               placeholder="Buscar codigo"
               th:value="${codigoBuscado}">

        <button type="submit">
            Buscar
        </button>
    </form>
    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Libro</th>
                <th>Fecha Inicio</th>
                <th>Fecha Fin</th>
                <th>Fecha devolución</th>
                <th>Estado</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="prestamo : ${prestamos}">

                <td th:text="${prestamo.idPrestamo}"></td>

                <td th:text="${prestamo.usuario.nombre}"></td>

                <td th:text="${prestamo.ejemplar.libro.titulo} + ' - ' + ${prestamo.ejemplar.libro.editorial}"></td>

                <td th:text="${prestamo.fechaInicio}"></td>
                
                <td th:text="${prestamo.fechaFin}"></td>

                <td th:text="${prestamo.fechaDevolucion}"></td>

                <td th:text="${prestamo.fechaDevolucion} == null ? Activo : Devuelto"></td>
                
            </tr>

        </tbody>

    </table>

</body>
</html>
