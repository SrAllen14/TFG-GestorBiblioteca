<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Préstamo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

<div class="container py-5">

    <!-- CABECERA -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Detalle del Préstamo</h2>

        <a th:href="@{/prestamo}" class="btn btn-dark">
            <i class="bi bi-arrow-left"></i> Volver
        </a>
    </div>

    <div class="row g-4">

        <!-- USUARIO -->
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white">
                    Usuario
                </div>

                <div class="card-body">
                    <p><strong>Nombre:</strong>
                        <span th:text="${prestamo.usuario.nombre}"></span>
                    </p>

                    <p><strong>Apellidos:</strong>
                        <span th:text="${prestamo.usuario.apellido1}"></span>
                        <span th:text="${prestamo.usuario.apellido2}"></span>
                    </p>

                    <p><strong>Rol:</strong>
                        <span th:text="${prestamo.usuario.rol}"></span>
                    </p>

                    <p>
                        <span class="badge bg-success"
                              th:if="${prestamo.usuario.activo}">
                            Activo
                        </span>

                        <span class="badge bg-secondary"
                              th:unless="${prestamo.usuario.activo}">
                            Inactivo
                        </span>
                    </p>
                </div>
            </div>
        </div>

        <!-- EJEMPLAR -->
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white">
                    Ejemplar
                </div>

                <div class="card-body">

                    <p><strong>Código:</strong>
                        <span th:text="${prestamo.ejemplar.codigo}"></span>
                    </p>

                    <p><strong>Título:</strong>
                        <span th:text="${prestamo.ejemplar.libro.titulo}"></span>
                    </p>
                    
                    <p><strong>Autor:</strong>
                        <span th:text="${prestamo.ejemplar.libro.autor}"></span>
                    </p>
                    
                    <p><strong>Editorial:</strong>
                        <span th:text="${prestamo.ejemplar.libro.editorial}"></span>
                    </p>

                    <p>
                        <span class="badge bg-warning text-dark"
                              th:if="${prestamo.fechaDevolucion == null}">
                            Prestado
                        </span>

                        <span class="badge bg-success"
                              th:unless="${prestamo.fechaDevolucion == null}">
                            Finalizado
                        </span>
                    </p>

                </div>
            </div>
        </div>

    </div>

    <!-- FINALIZAR PRÉSTAMO -->
    <div th:if="${prestamo.fechaDevolucion == null}" class="card shadow-sm border-0 mt-4">

        <div class="card-header bg-danger text-white">
            Finalizar préstamo
        </div>

        <div class="card-body">

            <form th:action="@{/prestamo/finalizar/{id}(id=${prestamo.idPrestamo})}"
                  method="post"
                  class="row g-3">

                <!-- Código del ejemplar -->
                <div class="col-md-6">
                    <label class="form-label">Introduce código del ejemplar</label>
                    <input type="text"
                           name="codigo"
                           class="form-control"
                           required>
                </div>

                <div class="col-md-12">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-check-circle"></i>
                        Finalizar préstamo
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
