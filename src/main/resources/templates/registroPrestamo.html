<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>
        Nuevo préstamo
    </title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        body{
            background-color:#f8f9fa;
        }

        .card-formulario{
            border:none;
            border-radius:12px;
        }

        .card-header-custom{
            background-color:#212529;
            color:white;
            border-radius:12px 12px 0 0 !important;
        }

        .btn-registrar{
            width:100%;
        }

    </style>

</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/">
            Inicio
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="/usuario">
                        Usuarios
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/libro">
                        Libros
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                       href="/prestamo">
                        Prestamos
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/login">
                        Iniciar sesión
                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- Contenido -->
<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9">

            <div class="card shadow-sm card-formulario">

                <!-- Cabecera -->
                <div class="card-header card-header-custom text-center py-3">

                    <h3 class="mb-1">

                        <i class="bi bi-journal-plus"></i>
                        Nuevo préstamo

                    </h3>

                    <small>
                        Registro de préstamos de biblioteca
                    </small>

                </div>

                <!-- Body -->
                <div class="card-body p-4">

                    <form method="post"
                          th:action="@{/prestamo/registro}"
                          th:object="${prestamoDTO}">

                        <!-- ID oculto -->
                        <input type="hidden"
                               th:field="*{idPrestamo}">

                        <!-- Usuario -->
                        <div class="mb-4">

                            <label class="form-label">

                                Usuario

                            </label>

                            <select th:field="*{idUsuario}"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Seleccione usuario
                                </option>

                                <option th:each="usuario : ${usuarios}"
                                        th:value="${usuario.idUsuario}"
                                        th:text="${usuario.nombre + ' ' + usuario.apellido1}">
                                </option>

                            </select>

                        </div>

                        <!-- Ejemplar -->
                        <div class="mb-4">

                            <label class="form-label">

                                Ejemplar

                            </label>

                            <select th:field="*{idEjemplar}"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Seleccione ejemplar
                                </option>

                                <option th:each="ejemplar : ${ejemplares}"
                                        th:value="${ejemplar.idEjemplar}"
                                        th:text="${ejemplar.codigo + ' - ' + ejemplar.libro.titulo}">
                                </option>

                            </select>

                        </div>

                        <!-- Fecha inicio -->
                        <div class="mb-4">

                            <label class="form-label">

                                Fecha inicio

                            </label>

                            <input type="date"
                                   th:field="*{fechaInicio}"
                                   class="form-control"
                                   required>

                        </div>

                        <!-- Fecha fin -->
                        <div class="mb-4">

                            <label class="form-label">

                                Fecha fin

                            </label>

                            <input type="date"
                                   th:field="*{fechaFin}"
                                   class="form-control"
                                   required>

                        </div>

                        <!-- Botones -->
                        <div class="d-grid gap-2">

                            <button type="submit"
                                    class="btn btn-primary btn-registrar">

                                <i class="bi bi-check-circle-fill"></i>
                                Registrar préstamo

                            </button>

                            <a th:href="@{/prestamo}"
                               class="btn btn-outline-secondary">

                                <i class="bi bi-arrow-left-circle"></i>
                                Volver

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
