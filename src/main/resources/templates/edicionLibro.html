<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Editar libro</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background-color:#f8f9fa;
        }

        .card-formulario{
            border:none;
            border-radius:12px;
        }

        .card-header-custom{
            background-color:#212529;
            color:white;
            border-radius:12px 12px 0 0 !important;
        }

        .btn-guardar{
            width:100%;
        }

    </style>
</head>

<body class="bg-light">

<!-- NAVBAR (MISMO QUE RESTO DE LA APP) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">Inicio</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/usuario">Usuarios</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/libro">Libros</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/prestamo">Préstamos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/login">Iniciar sesión</a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<!-- CONTENIDO -->
<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9">

            <div class="card shadow-sm card-formulario">

                <!-- CABECERA -->
                <div class="card-header card-header-custom text-center py-3">

                    <h2>
                        <i class="bi bi-pencil-square"></i>
                        Editar Libro
                    </h2>

                    <p class="mb-0">
                        Modificación de datos del libro
                    </p>

                </div>

                <!-- CUERPO -->
                <div class="card-body p-4">

                    <form th:action="@{/libro/editar/{id}(id=${libro.idLibro})}"
                          th:object="${libro}"
                          method="post">

                        <!-- TÍTULO -->
                        <div class="mb-3">

                            <label class="form-label">Título</label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{titulo}"
                                   required>
                            <div class="text-danger" th:if="${#fields.hasErrors('titulo')}" th:errors='*{titulo}'></div>

                        </div>

                        <!-- AUTOR -->
                        <div class="mb-3">

                            <label class="form-label">Autor</label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{autor}"
                                   required>
                            <div class="text-danger" th:if="${#fields.hasErrors('autor')}" th:errors='*{autor}'></div>
                        </div>

                        <!-- GÉNERO -->
                        <div class="mb-3">

                            <label class="form-label">Género</label>

                            <select class="form-select"
                                    th:field="*{genero}"
                                    required>

                                <option value="">Seleccione un género</option>

                                <option value="ACCION">Acción</option>
                                <option value="HISTORICA">Histórica</option>
                                <option value="CIENCIA_FICCION">Ciencia ficción</option>
                                <option value="NOVELA_NEGRA">Novela negra</option>
                                <option value="ROMANTICA">Romántica</option>
                                <option value="ENCICLOPEDIA">Enciclopedia</option>
                                <option value="DICCIONARIO">Diccionario</option>
                                <option value="POESIA">Poesía</option>
                                <option value="TEATRO">Teatro</option>

                            </select>

                        </div>

                        <!-- EDITORIAL -->
                        <div class="mb-3">

                            <label class="form-label">Editorial</label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{editorial}"
                                   required>
                            <div class="text-danger" th:if="${#fields.hasErrors('editorial')}" th:errors='*{editorial}'></div>
                        </div>

                        <!-- ISBN -->
                        <div class="mb-4">

                            <label class="form-label">ISBN</label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{isbn}"
                                   required>
                            <div class="text-danger" th:if="${#fields.hasErrors('isbn')}" th:errors='*{isbn}'></div>
                        </div>

                        <!-- BOTONES -->
                        <div class="d-grid gap-2">

                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i>
                                Guardar cambios
                            </button>

                            <a th:href="@{/libro}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i>
                                Volver
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
