<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    
      <div class="container">
          
          <div class="row justify-content-center align-items-center vh-100">
              
              <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                  
                  <div class="card shadow-lg border-0 rounded-4">
                      
                      <div class="card-body p-5">
                          
                          <div class="text-center mb-4">
                              <h2 class="fw-bold">Iniciar sesión</h2>
                              <p class="text-muted">Usuarios bibliotecarios y administradores</p>
                          </div>
                          <form th:action="@{/login}" method="post">
                              
                              <div class="mb-3">
                                  <div class="alert alert-danger" th:if="${param.error}">Usuario o contraseña incorrectos</div>
                                  <label class="form-label">Usuario</label>
                                  <input type="text" name="username" class="form-control" placeholder="Introducir usuario..." required />
                              </div>
                              
                              <div class="mb-4">
                                  <label class="form-label">Contraseña</label>
                                  <input type="password" name="password" class="form-control" placeholder="Introducir contraseña..." required />
                              </div>
                              
                              <div class="d-grid">
                                  <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                              </div>
                          </form>
                      </div>
                  </div>
              </div>
          </div>
      </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
