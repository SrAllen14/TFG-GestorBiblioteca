<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">

    <title>Inicio de sesión</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/">

            Gestor de Biblioteca Escolar

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="/usuario">

                        Usuarios

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/libro">

                        Libros

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/prestamo">

                        Préstamos

                    </a>

                </li>

                <li class="nav-item dropdown"
                    sec:authorize="isAuthenticated()">

                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2"
                       href="#"
                       role="button"
                       data-bs-toggle="dropdown">

                        <div class="rounded-circle bg-primary text-white d-flex justify-content-center align-items-center"
                             style="width:35px;height:35px;">

                            <i class="bi bi-person-fill"></i>

                        </div>

                        <span sec:authentication="name"></span>

                    </a>

                    <ul class="dropdown-menu dropdown-menu-end shadow border-0">

                        <li>

                            <a class="dropdown-item"
                               href="/usuario/perfil">

                                <i class="bi bi-person-circle"></i>
                                Mi perfil

                            </a>

                        </li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li>

                            <form th:action="@{/logout}"
                                  method="post"
                                  class="m-0">

                                <button type="submit"
                                        class="dropdown-item text-danger">

                                    <i class="bi bi-box-arrow-right"></i>
                                    Cerrar sesión

                                </button>

                            </form>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

    </div>

</nav>

<main class="container py-5 flex-grow-1">

<div class="container">
          
          <div class="row justify-content-center align-items-center vh-100">
              
              <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                  
                  <div class="card shadow-lg border-0 rounded-4">
                      
                      <div class="card-body p-5">
                          
                          <div class="text-center mb-4">
                              <h2 class="fw-bold">Iniciar sesión</h2>
                              <p class="text-muted">Usuarios bibliotecarios y administradores</p>
                          </div>
                          <form th:action="@{/login}" method="post">
                              
                              <div class="mb-3">
                                  <div class="alert alert-danger" th:if="${param.error}">Usuario o contraseña incorrectos</div>
                                  <label class="form-label">Usuario</label>
                                  <input type="text" name="username" class="form-control" placeholder="Introducir usuario..." required />
                              </div>
                              
                              <div class="mb-4">
                                  <label class="form-label">Contraseña</label>
                                  <input type="password" name="password" class="form-control" placeholder="Introducir contraseña..." required />
                              </div>
                              
                              <div class="d-grid">
                                  <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                              </div>
                          </form>
                      </div>
                  </div>
              </div>
          </div>
      </div>

    
</main>

<footer class="bg-dark text-white py-4 mt-auto shadow">

    <div class="container text-center">

        <p class="mb-3 fw-semibold">

            © 2026 Todos los derechos reservados · Álvaro Allen Perlines

        </p>

        <div class="d-flex justify-content-center gap-4 flex-wrap">

            <a href="https://github.com"
               target="_blank"
               class="text-white text-decoration-none">

                <i class="bi bi-github"></i>
                GitHub

            </a>

            <a href="#"
               class="text-white text-decoration-none">

                <i class="bi bi-file-earmark-code"></i>
                JavaDoc

            </a>

            <a href="#"
               class="text-white text-decoration-none">

                <i class="bi bi-file-earmark-pdf-fill text-danger"></i>
                PDF

            </a>

        </div>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
