<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar préstamo</title>
</head>

<body>

<h1>Editar préstamo</h1>

<form method="post"
      th:action="@{/prestamo/editar/{idPrestamo}(idPrestamo=${prestamoDTO.idPrestamo})}"
      th:object="${prestamoDTO}">

    <!-- ID préstamo (CLAVE en edición) -->
    <input type="hidden" th:field="*{idPrestamo}">

    <!-- ========================= -->
    <!-- USUARIO -->
    <!-- ========================= -->

    <div>
        <label>Usuario</label>

        <select th:field="*{idUsuario}" required>
            <option value="">Seleccione usuario</option>

            <option th:each="usuario : ${usuarios}"
                    th:value="${usuario.idUsuario}"
                    th:text="${usuario.nombre + ' ' + usuario.apellido1}">
            </option>
        </select>
    </div>

    <br>

    <!-- ========================= -->
    <!-- EJEMPLAR -->
    <!-- ========================= -->

    <div>
        <label>Ejemplar</label>

        <select th:field="*{idEjemplar}" required>
            <option value="">Seleccione ejemplar</option>

            <option th:each="ejemplar : ${ejemplares}"
                    th:value="${ejemplar.idEjemplar}"
                    th:text="${ejemplar.libro.titulo + ' - ' + ejemplar .codigo}">
            </option>
        </select>
    </div>

    <br>

    <!-- ========================= -->
    <!-- FECHAS -->
    <!-- ========================= -->

    <div>
        <label>Fecha inicio</label>
        <input type="date" th:field="*{fechaInicio}">
    </div>

    <br>

    <div>
        <label>Fecha fin</label>
        <input type="date" th:field="*{fechaFin}">
    </div>

    <br>

    <!-- ========================= -->
    <!-- BOTÓN -->
    <!-- ========================= -->

    <button type="submit">
        Guardar cambios
    </button>

</form>

<br>

<a th:href="@{/prestamo}">
    Volver
</a>

</body>
</html>
