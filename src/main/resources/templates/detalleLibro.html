<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Libro</title>

    <!-- Bootstrap CSS -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/">
            📚 Biblioteca MVC
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/usuario">Usuarios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/libro">Libros</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/prestamo">Prestamos</a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">

                        <a class="nav-link dropdown-toggle d-flex align-items-center gap-2"
                           href="#"
                           role="button"
                           data-bs-toggle="dropdown"
                           aria-expanded="false">

                            <!-- CÍRCULO USUARIO -->
                            <div class="rounded-circle bg-primary text-white d-flex justify-content-center align-items-center"
                                 style="width: 35px; height: 35px;">

                                <i class="bi bi-person-fill"></i>

                            </div>

                            <!-- USERNAME -->
                            <span sec:authentication="name"></span>

                        </a>

                        <ul class="dropdown-menu dropdown-menu-end shadow border-0">

                            <!-- EDITAR PERFIL -->
                            <li>
                                <a class="dropdown-item"
                                   href="/usuario/perfil">

                                    <i class="bi bi-person-circle"></i>
                                    Editar perfil

                                </a>
                            </li>

                            <li><hr class="dropdown-divider"></li>

                            <!-- LOGOUT -->
                            <li>

                                <form th:action="@{/logout}"
                                      method="post"
                                      class="m-0">

                                    <button type="submit"
                                            class="dropdown-item text-danger">

                                        <i class="bi bi-box-arrow-right"></i>
                                        Cerrar sesión

                                    </button>

                                </form>

                            </li>

                        </ul>

                    </li>
                </ul>
            </div>

    </div>

</nav>

<!-- CONTENIDO -->
<div class="container py-5">

    <!-- TÍTULO -->
    <div class="mb-4">

        <h1 class="fw-bold">
            Información del Libro
        </h1>

    </div>

    <!-- CARD LIBRO -->
    <div class="card shadow-sm border-0 mb-5">

        <div class="card-header bg-dark text-white">

            <h4 class="mb-0">
                <i class="bi bi-book"></i>
                Datos del libro
            </h4>

        </div>

        <div class="card-body">

            <div class="row g-4">

                <div class="col-md-6">

                    <p>
                        <strong>ID:</strong>
                        <span th:text="${libro.idLibro}"></span>
                    </p>

                    <p>
                        <strong>Título:</strong>
                        <span th:text="${libro.titulo}"></span>
                    </p>

                    <p>
                        <strong>Autor:</strong>
                        <span th:text="${libro.autor}"></span>
                    </p>

                </div>

                <div class="col-md-6">

                    <p>
                        <strong>Género:</strong>
                        <span th:text="${libro.genero}"></span>
                    </p>

                    <p>
                        <strong>Editorial:</strong>
                        <span th:text="${libro.editorial}"></span>
                    </p>

                    <p>
                        <strong>ISBN:</strong>
                        <span th:text="${libro.isbn}"></span>
                    </p>

                </div>

            </div>

        </div>

    </div>

    <!-- TABLA EJEMPLARES -->
    <div class="card shadow-sm border-0">

        <div class="card-header bg-dark text-white">

            <h4 class="mb-0">
                <i class="bi bi-journal-bookmark"></i>
                Ejemplares
            </h4>

        </div>
        <div class="px-3 pt-3">

            <form th:action="@{/ejemplar/{idLibro}/registro(idLibro=${libro.idLibro})}"
                  method="post"
                  class="d-flex justify-content-end">

                <button type="submit"
                        class="btn btn-success shadow-sm">

                    <i class="bi bi-plus-circle"></i>
                    Registrar ejemplar

                </button>

            </form>

        </div>
        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Código</th>
                        <th>Estado</th>
                        <th>Préstamo</th>
                        <th class="text-center">Estado lógico</th>
                        <th class="text-center">Acción</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="ejemplar : ${ejemplares}"
                        th:classappend="${ejemplar.prestado} ? 'table-secondary'">

                        <td th:text="${ejemplar.idEjemplar}"></td>

                        <td th:text="${ejemplar.codigo}"></td>

                        <td>

                            <!-- BAJA LÓGICA -->
                            <span th:if="${!ejemplar.activo}"
                                  class="badge bg-black">

                                Baja lógica

                            </span>

                            <span th:if="${ejemplar.activo and ejemplar.prestado}"
                                  class="badge bg-secondary">

                                Prestado

                            </span>

                            <span th:if="${ejemplar.activo and !ejemplar.prestado}"
                                  class="badge bg-success">

                                Disponible

                            </span>

                        </td>

                        <td>
                            <a th:if="${ejemplar.prestado}"
                                th:href="@{/prestamo/consultar/{id}(id=${ejemplar.prestamoActivo.idPrestamo})}"
                                class="btn btn-sm btn-dark">

                                 <i class="bi bi-box-arrow-up-right"></i>
                                 Ver préstamo

                             </a>

                             <span th:unless="${ejemplar.prestado}"
                                   class="text-muted">

                                 Sin préstamo activo

                             </span>                           
                        </td>
                        <td class="text-center">
                            <div th:if="${!ejemplar.prestado}">

                                <!-- EJEMPLAR ACTIVO -->
                                <form th:if="${ejemplar.activo}"
                                      th:action="@{/libro/consultar/{idLibro}/estado/{idEjemplar}(idLibro=${ejemplar.libro.idLibro}, idEjemplar=${ejemplar.idEjemplar})}"
                                      method="post"
                                      class="d-inline">

                                    <button type="submit"
                                            class="btn btn-danger btn-sm"
                                            title="Dar de baja">

                                        <i class="bi bi-x-circle"></i>

                                    </button>

                                </form>

                                <!-- EJEMPLAR INACTIVO -->
                                <form th:unless="${ejemplar.activo}"
                                      th:action="@{/libro/consultar/{idLibro}/estado/{idEjemplar}(idLibro=${ejemplar.libro.idLibro}, idEjemplar=${ejemplar.idEjemplar})}"
                                      method="post"
                                      class="d-inline">

                                    <button type="submit"
                                            class="btn btn-success btn-sm"
                                            title="Reactivar ejemplar">

                                        <i class="bi bi-check-circle"></i>

                                    </button>

                                </form>

                            </div>

                            <!-- SI ESTÁ PRESTADO -->
                            <span th:if="${ejemplar.prestado}"
                                  class="text-muted">

                                <i class="bi bi-lock"></i>

                            </span>

                        </td>
                        <td>
                            <a th:if="${ejemplar.prestamoActivo != null}"
                                th:href="@{/prestamo/consultar/{id}(id=${ejemplar.prestamoActivo.idPrestamo})}"
                                class="btn btn-info btn-sm text-white">

                                 <i class="bi bi-eye"></i>
                             </a>
                        </td>
                    </tr>
                    
                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- BOTONES -->
    <div class="d-flex justify-content-center gap-3 mt-5">

        <a th:href="@{/libro}"
           class="btn btn-dark">

            <i class="bi bi-arrow-left"></i>
            Volver

        </a>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
