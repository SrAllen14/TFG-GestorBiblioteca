<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registrar Usuario</title>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        body{
            background-color:#f8f9fa;
        }

        .card-formulario{
            border:none;
            border-radius:12px;
        }

        .card-header-custom{
            background-color:#212529;
            color:white;
            border-radius:12px 12px 0 0 !important;
        }

        .btn-crear{
            width:100%;
        }

    </style>

</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/">
            Inicio
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="/usuario">
                        Usuarios
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/libro">
                        Libros
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/prestamo">
                        Prestamos
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/login">
                        Iniciar sesión
                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- Contenido -->
<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9">

            <div class="card shadow-sm card-formulario">

                <!-- Cabecera -->
                <div class="card-header card-header-custom text-center py-3">

                    <h3 class="mb-1">

                        <i class="bi bi-person-plus-fill"></i>
                        Registrar Usuario

                    </h3>

                    <small>
                        Gestión de usuarios de la biblioteca
                    </small>

                </div>

                <!-- Body -->
                <div class="card-body p-4">

                    <form th:action="@{/usuario/crear}"
                          th:object="${usuarioDTO}"
                          method="post">

                        <!-- Nombre -->
                        <div class="mb-3">

                            <label for="dni"
                                   class="form-label">

                                DNI

                            </label>

                            <input type="text"
                                   id="dni"
                                   class="form-control"
                                   th:field="*{dni}"
                                   required>
                            <div class="text-danger" th:if="${#fields.hasErrors('dni')}" th:errors='*{dni}'></div>
                            <div class="text-danger" th:if="${errorDni}" th:text="${errorDni}"></div>
                        </div>
                        
                        <!-- Nombre -->
                        <div class="mb-3">

                            <label for="nombre"
                                   class="form-label">

                                Nombre

                            </label>

                            <input type="text"
                                   id="nombre"
                                   class="form-control"
                                   th:field="*{nombre}"
                                   required>
                            <div class="text-danger" th:if="${#fields.hasErrors('nombre')}" th:errors='*{nombre}'></div>
                        </div>

                        <!-- Primer apellido -->
                        <div class="mb-3">

                            <label for="apellido1"
                                   class="form-label">

                                Primer apellido

                            </label>

                            <input type="text"
                                   id="apellido1"
                                   class="form-control"
                                   th:field="*{apellido1}"
                                   required>
                            <div class="text-danger" th:if="${#fields.hasErrors('apellido1')}" th:errors='*{apellido1}'></div>
                        </div>

                        <!-- Segundo apellido -->
                        <div class="mb-3">

                            <label for="apellido2"
                                   class="form-label">

                                Segundo apellido

                            </label>

                            <input type="text"
                                   id="apellido2"
                                   class="form-control"
                                   th:field="*{apellido2}"
                                   required>
                            <div class="text-danger" th:if="${#fields.hasErrors('apellido2')}" th:errors='*{apellido2}'></div>
                        </div>

                        <!-- Rol -->
                        <div class="mb-4">

                            <label for="rol"
                                   class="form-label">

                                Rol

                            </label>

                            <select id="rol"
                                    class="form-select"
                                    th:field="*{rol}"
                                    required>
                                
                                <option value="">
                                    Seleccione un rol
                                </option>

                                <option value="ROLE_ALUMNO">
                                    Alumno
                                </option>

                                <option value="ROLE_PROFESOR">
                                    Profesor
                                </option>

                                <option value="ROLE_BIBLIOTECARIO">
                                    Bibliotecario
                                </option>

                                <option value="ROLE_ADMINISTRADOR">
                                    Administrador
                                </option>

                            </select>
                            <div class="text-danger" th:if="${#fields.hasErrors('rol')}" th:errors='*{rol}'></div>
                        </div>

                        <!-- Credenciales -->
                        <div id="credenciales"
                             class="border rounded p-3 mb-4 bg-light"
                             style="display:none;">

                            <h5 class="mb-3">

                                <i class="bi bi-shield-lock-fill"></i>
                                Credenciales de acceso

                            </h5>

                            <!-- Username -->
                            <div class="mb-3">

                                <label for="username"
                                       class="form-label">

                                    Usuario

                                </label>

                                <input type="text"
                                       id="username"
                                       class="form-control"
                                       th:field="*{username}">
                                <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors='*{username}'></div>
                            </div>

                            <!-- Password -->
                            <div>

                                <label for="password"
                                       class="form-label">

                                    Contraseña

                                </label>

                                <input type="password"
                                       id="password"
                                       class="form-control"
                                       th:field="*{password}">
                                <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors='*{password}'></div>
                            </div>

                        </div>

                        <!-- Mensajes -->
                        <div th:if="${error}"
                             class="alert alert-danger">

                            <span th:text="${error}"></span>

                        </div>

                        <div th:if="${success}"
                             class="alert alert-success">

                            <span th:text="${success}"></span>

                        </div>

                        <!-- Botones -->
                        <div class="d-grid gap-2">

                            <button type="submit"
                                    class="btn btn-primary btn-crear">

                                <i class="bi bi-check-circle-fill"></i>
                                Crear usuario

                            </button>

                            <a th:href="@{/usuario}"
                               class="btn btn-outline-secondary">

                                <i class="bi bi-arrow-left-circle"></i>
                                Volver

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

    const rolSelect =
        document.getElementById("rol");

    const credenciales =
        document.getElementById("credenciales");

    function mostrarCredenciales() {

        if (rolSelect.value === "ROLE_ADMINISTRADOR" ||
            rolSelect.value === "ROLE_BIBLIOTECARIO") {

            credenciales.style.display = "block";

        } else {

            credenciales.style.display = "none";
        }
    }

    rolSelect.addEventListener(
        "change",
        mostrarCredenciales
    );

    mostrarCredenciales();

</script>

</body>
</html>
