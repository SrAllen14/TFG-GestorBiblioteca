<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">

    <title>Inicio</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/">

            Gestor de Biblioteca Escolar

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="/usuario">

                        Usuarios

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/libro">

                        Libros

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/prestamo">

                        Préstamos

                    </a>

                </li>
                
                <li class="nav-item" sec:authorize="isAnonymous()">

                    <a class="nav-link" href="/login">
                        Iniciar sesión
                    </a>

                </li>

                
                <li class="nav-item dropdown"
                    sec:authorize="isAuthenticated()">

                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2"
                       href="#"
                       role="button"
                       data-bs-toggle="dropdown">

                        <div class="rounded-circle bg-primary text-white d-flex justify-content-center align-items-center"
                             style="width:35px;height:35px;">

                            <i class="bi bi-person-fill"></i>

                        </div>

                        <span sec:authentication="name"></span>

                    </a>

                    <ul class="dropdown-menu dropdown-menu-end shadow border-0">

                        <li>

                            <a class="dropdown-item"
                               href="/usuario/perfil">

                                <i class="bi bi-person-circle"></i>
                                Mi perfil

                            </a>

                        </li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li>

                            <form th:action="@{/logout}"
                                  method="post"
                                  class="m-0">

                                <button type="submit"
                                        class="dropdown-item text-danger">

                                    <i class="bi bi-box-arrow-right"></i>
                                    Cerrar sesión

                                </button>

                            </form>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

    </div>

</nav>

<main class="container py-5 flex-grow-1">
    <div class="container py-5"> 
          <div class="row g-4"> 
              <div class="col-md-4"> 
                  <div class="card shadow-sm text-center"> 
                      <div class="card-body"> 
                          <h5>📚 Libros activos</h5> 
                          <h2 id="librosActivos"></h2>
                      </div> 
                  </div> 
              </div> 
              <div class="col-md-4"> 
                  <div class="card shadow-sm text-center"> 
                      <div class="card-body"> 
                          <h5>📖 Préstamos activos</h5>  
                          <h2 id="prestamosActivos"></h2>
                      </div> 
                  </div> 
              </div> 
              <div class="col-md-4"> 
                  <div class="card shadow-sm text-center"> 
                      <div class="card-body"> 
                          <h5>👥 Usuarios activos</h5> 
                          <h2 id="usuariosActivos"></h2>
                      </div> 
                  </div> 
              </div> 
          </div> 
      </div>
      
      <div class="container py-5">
          <h2 class="mb-4"></h2>
          
          <div class="row g-4">
              <div class="col-md-4">
                  <div class="card shadow-sm h-100">
                      <div class="card-body">
                          <h5 class="card-title"></h5>
                          <p class="card-text"></p>
                          <a class="btn btn-primary" target="_blank" href="#"></a>
                      </div>
                  </div>
              </div>
              
              <div class="col-md-4">
                  <div class="card shadow-sm h-100">
                      <div class="card-body">
                          <h5 class="card-title"></h5>
                          <p class="card-text"></p>
                          <a class="btn btn-primary" target="_blank" href="#"></a>
                      </div>
                  </div>
              </div>
              
              <div class="col-md-4">
                  <div class="card shadow-sm h-100">
                      <div class="card-body">
                          <h5 class="card-title"></h5>
                          <p class="card-text"></p>
                          <a class="btn btn-primary" target="_blank" href="#"></a>
                      </div>
                  </div>
              </div>
          </div>
      </div>
      
      <script>
        document.addEventListener("DOMContentLoaded", function () {

            cargarDashboard();

            function cargarDashboard() {
                fetch("/api/inicio")
                    .then(response => {
                        if (!response.ok) {
                            throw new Error("Error al cargar datos del dashboard");
                        }
                        return response.json();
                    })
                    .then(data => {

                        document.getElementById("librosActivos").textContent = data.librosActivos;
                        document.getElementById("prestamosActivos").textContent = data.prestamosActivos;
                        document.getElementById("usuariosActivos").textContent = data.usuariosActivos;

                    })
                    .catch(error => {
                        console.error("Error:", error);
                    });
            }

        });
        </script>

</main>

<footer class="bg-dark text-white py-4 mt-auto shadow">

    <div class="container text-center">

        <p class="mb-3 fw-semibold">

            © 2026 Todos los derechos reservados · Álvaro Allen Perlines

        </p>

        <div class="d-flex justify-content-center gap-4 flex-wrap">

            <a href="https://github.com"
               target="_blank"
               class="text-white text-decoration-none">

                <i class="bi bi-github"></i>
                GitHub

            </a>

            <a href="#"
               class="text-white text-decoration-none">

                <i class="bi bi-file-earmark-code"></i>
                JavaDoc

            </a>

            <a href="#"
               class="text-white text-decoration-none">

                <i class="bi bi-file-earmark-pdf-fill text-danger"></i>
                PDF

            </a>

        </div>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
