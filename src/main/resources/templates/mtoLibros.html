<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">

    <title>Mantenimiento de libros</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/">

            Gestor de Biblioteca Escolar

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="/usuario">

                        Usuarios

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/libro">

                        Libros

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/prestamo">

                        Préstamos

                    </a>

                </li>

                <li class="nav-item dropdown"
                    sec:authorize="isAuthenticated()">

                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2"
                       href="#"
                       role="button"
                       data-bs-toggle="dropdown">

                        <div class="rounded-circle bg-primary text-white d-flex justify-content-center align-items-center"
                             style="width:35px;height:35px;">

                            <i class="bi bi-person-fill"></i>

                        </div>

                        <span sec:authentication="name"></span>

                    </a>

                    <ul class="dropdown-menu dropdown-menu-end shadow border-0">

                        <li>

                            <a class="dropdown-item"
                               href="/usuario/perfil">

                                <i class="bi bi-person-circle"></i>
                                Mi perfil

                            </a>

                        </li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li>

                            <form th:action="@{/logout}"
                                  method="post"
                                  class="m-0">

                                <button type="submit"
                                        class="dropdown-item text-danger">

                                    <i class="bi bi-box-arrow-right"></i>
                                    Cerrar sesión

                                </button>

                            </form>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

    </div>

</nav>

<main class="container py-5 flex-grow-1">

<div class="container py-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1 class="fw-bold">
            Mantenimiento de Libros
        </h1>

        <a th:href="@{/libro/crear}"
           class="btn btn-primary">
            <i class="bi bi-plus-circle"></i>
            Nuevo libro
        </a>

    </div>

    <!-- ACCIONES -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">

            <div class="row g-3 align-items-center">

                <!-- EXPORTAR -->
                <div class="col-md-auto">
                    <a th:href="@{/libro/exportar}"
                       class="btn btn-success">
                        <i class="bi bi-download"></i>
                        Exportar CSV
                    </a>
                </div>

                <!-- IMPORTAR -->
                <div class="col">

                    <form method="post"
                          action="/libro/importar"
                          enctype="multipart/form-data"
                          class="row g-2">

                        <div class="col-md-6">
                            <input type="file"
                                   name="archivo"
                                   accept=".csv"
                                   required
                                   class="form-control">
                        </div>

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />

                        <div class="col-md-auto">
                            <button type="submit"
                                    class="btn btn-dark">
                                <i class="bi bi-upload"></i>
                                Importar CSV
                            </button>
                        </div>

                    </form>
                    
                </div>
                
            </div>
            <div th:if="${error}" class="alert alert-danger mt-3">
                <span th:text="${error}"></span>
            </div>
        </div>
    </div>

    <!-- FILTRO -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">

            <form th:action="@{/libro}"
                  method="get"
                  class="row g-3">

                <div class="col-md-5">
                    <input type="text"
                           name="busqueda"
                           placeholder="Buscar libro..."
                           th:value="${busqueda}"
                           class="form-control">
                </div>

                <div class="col-md-3">
                    <select name="activo"
                            class="form-select">

                        <option value=""
                                th:selected="${activo == null}">
                            Todos
                        </option>

                        <option value="true"
                                th:selected="${activo == 'true'}">
                            Activos
                        </option>

                        <option value="false"
                                th:selected="${activo == 'false'}">
                            Inactivos
                        </option>

                    </select>
                </div>

                <div class="col-md-auto">
                    <button type="submit"
                            class="btn btn-primary">
                        <i class="bi bi-search"></i>
                        Buscar
                    </button>
                </div>

            </form>

        </div>
    </div>

    <!-- TABLA -->
    <div class="card shadow-sm border-0">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Género</th>
                        <th>Editorial</th>
                        <th>ISBN</th>
                        <th class="text-center">
                            Acciones
                        </th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="libro : ${libros}">

                        <td th:text="${libro.idLibro}"></td>

                        <td th:text="${libro.titulo}"></td>

                        <td th:text="${libro.autor}"></td>

                        <td th:text="${libro.genero}"></td>

                        <td th:text="${libro.editorial}"></td>

                        <td th:text="${libro.isbn}"></td>

                        <td>

                            <div class="d-flex gap-2 justify-content-center">

                                <!-- EDITAR -->
                                <a th:href="@{/libro/editar/{id}(id=${libro.idLibro})}"
                                   class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil-square"></i>
                                </a>

                                <!-- ESTADO -->
                                <form th:action="@{/libro/estado/{id}(id=${libro.idLibro})}"
                                      method="post">

                                    <button type="submit"
                                            class="btn btn-secondary btn-sm">

                                        <span th:text="${libro.activo} ? 'Dar de baja' : 'Rehabilitar'"></span>

                                    </button>

                                </form>

                                <!-- CONSULTAR -->
                                <a th:href="@{/libro/consultar/{id}(id=${libro.idLibro})}"
                                   class="btn btn-info btn-sm text-white">

                                    <i class="bi bi-eye"></i>

                                </a>

                            </div>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- PAGINACIÓN -->
    <div class="d-flex justify-content-center align-items-center gap-3 mt-4">

        <a class="btn btn-outline-dark"
           th:if="${pagina.hasPrevious()}"
           th:href="@{/libro(
                page=${pagina.number - 1},
                busqueda=${busqueda}
           )}">

            <i class="bi bi-arrow-left"></i>
            Anterior

        </a>

        <span class="fw-bold fs-5"
              th:text="${pagina.number + 1}">
        </span>

        <a class="btn btn-outline-dark"
           th:if="${pagina.hasNext()}"
           th:href="@{/libro(
                page=${pagina.number + 1},
                busqueda=${busqueda}
           )}">

            Siguiente
            <i class="bi bi-arrow-right"></i>

        </a>

    </div>

    <!-- BOTÓN INICIO -->
    <div class="text-center mt-5">

        <a href="/"
           class="btn btn-dark">

            <i class="bi bi-house"></i>
            Inicio

        </a>

    </div>

</div>

    
</main>

<footer class="bg-dark text-white py-4 mt-auto shadow">

    <div class="container text-center">

        <p class="mb-3 fw-semibold">

            © 2026 Todos los derechos reservados · Álvaro Allen Perlines

        </p>

        <div class="d-flex justify-content-center gap-4 flex-wrap">

            <a href="https://github.com"
               target="_blank"
               class="text-white text-decoration-none">

                <i class="bi bi-github"></i>
                GitHub

            </a>

            <a href="#"
               class="text-white text-decoration-none">

                <i class="bi bi-file-earmark-code"></i>
                JavaDoc

            </a>

            <a href="#"
               class="text-white text-decoration-none">

                <i class="bi bi-file-earmark-pdf-fill text-danger"></i>
                PDF

            </a>

        </div>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
