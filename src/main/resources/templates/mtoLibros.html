<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mantenimiento de Libros</title>

    <!-- Bootstrap CSS -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/">
            📚 Biblioteca MVC
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="/libro">
                        Libros
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/">
                        Inicio
                    </a>
                </li>

            </ul>

        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="container py-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1 class="fw-bold">
            Mantenimiento de Libros
        </h1>

        <a th:href="@{/libro/crear}"
           class="btn btn-primary">
            <i class="bi bi-plus-circle"></i>
            Nuevo libro
        </a>

    </div>

    <!-- ACCIONES -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">

            <div class="row g-3 align-items-center">

                <!-- EXPORTAR -->
                <div class="col-md-auto">
                    <a th:href="@{/libro/exportar}"
                       class="btn btn-success">
                        <i class="bi bi-download"></i>
                        Exportar CSV
                    </a>
                </div>

                <!-- IMPORTAR -->
                <div class="col">

                    <form method="post"
                          action="/libro/importar"
                          enctype="multipart/form-data"
                          class="row g-2">

                        <div class="col-md-6">
                            <input type="file"
                                   name="archivo"
                                   accept=".csv"
                                   required
                                   class="form-control">
                        </div>

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />

                        <div class="col-md-auto">
                            <button type="submit"
                                    class="btn btn-dark">
                                <i class="bi bi-upload"></i>
                                Importar CSV
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

    <!-- FILTRO -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">

            <form th:action="@{/libro}"
                  method="get"
                  class="row g-3">

                <div class="col-md-5">
                    <input type="text"
                           name="busqueda"
                           placeholder="Buscar libro..."
                           th:value="${busqueda}"
                           class="form-control">
                </div>

                <div class="col-md-3">
                    <select name="activo"
                            class="form-select">

                        <option value=""
                                th:selected="${activo == null}">
                            Todos
                        </option>

                        <option value="true"
                                th:selected="${activo == 'true'}">
                            Activos
                        </option>

                        <option value="false"
                                th:selected="${activo == 'false'}">
                            Inactivos
                        </option>

                    </select>
                </div>

                <div class="col-md-auto">
                    <button type="submit"
                            class="btn btn-primary">
                        <i class="bi bi-search"></i>
                        Buscar
                    </button>
                </div>

            </form>

        </div>
    </div>

    <!-- TABLA -->
    <div class="card shadow-sm border-0">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Género</th>
                        <th>Editorial</th>
                        <th>ISBN</th>
                        <th class="text-center">
                            Acciones
                        </th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="libro : ${libros}">

                        <td th:text="${libro.idLibro}"></td>

                        <td th:text="${libro.titulo}"></td>

                        <td th:text="${libro.autor}"></td>

                        <td th:text="${libro.genero}"></td>

                        <td th:text="${libro.editorial}"></td>

                        <td th:text="${libro.isbn}"></td>

                        <td>

                            <div class="d-flex gap-2 justify-content-center">

                                <!-- EDITAR -->
                                <a th:href="@{/libro/editar/{id}(id=${libro.idLibro})}"
                                   class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil-square"></i>
                                </a>

                                <!-- ESTADO -->
                                <form th:action="@{/libro/estado/{id}(id=${libro.idLibro})}"
                                      method="post">

                                    <button type="submit"
                                            class="btn btn-secondary btn-sm">

                                        <span th:text="${libro.activo} ? 'Dar de baja' : 'Rehabilitar'"></span>

                                    </button>

                                </form>

                                <!-- CONSULTAR -->
                                <a th:href="@{/libro/consultar/{id}(id=${libro.idLibro})}"
                                   class="btn btn-info btn-sm text-white">

                                    <i class="bi bi-eye"></i>

                                </a>

                            </div>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- PAGINACIÓN -->
    <div class="d-flex justify-content-center align-items-center gap-3 mt-4">

        <a class="btn btn-outline-dark"
           th:if="${pagina.hasPrevious()}"
           th:href="@{/libro(
                page=${pagina.number - 1},
                busqueda=${busqueda}
           )}">

            <i class="bi bi-arrow-left"></i>
            Anterior

        </a>

        <span class="fw-bold fs-5"
              th:text="${pagina.number + 1}">
        </span>

        <a class="btn btn-outline-dark"
           th:if="${pagina.hasNext()}"
           th:href="@{/libro(
                page=${pagina.number + 1},
                busqueda=${busqueda}
           )}">

            Siguiente
            <i class="bi bi-arrow-right"></i>

        </a>

    </div>

    <!-- BOTÓN INICIO -->
    <div class="text-center mt-5">

        <a href="/"
           class="btn btn-dark">

            <i class="bi bi-house"></i>
            Inicio

        </a>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
