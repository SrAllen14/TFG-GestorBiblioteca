<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mantenimiento de Libros</title>
    <style>

        body{
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin: 20px;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th{
            background-color: lightgray;
        }

        .boton{
            padding: 10px 15px;
            background-color: #2d89ef;
            margin: 20px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

    </style>
</head>
<body>

<h1>📚 Mantenimiento de Libros</h1>

<br>

<a th:href="@{/libro/crear}">
    <button class="boton">➕ Nuevo libro</button>
</a>
<div></div>
<a th:href="@{/libro/exportar}"
   class="boton">
    Exportar CSV
</a>
<br>
<form method="post" action="/libro/importar" enctype="multipart/form-data">
    <input type="file" name="archivo" accept=".csv" required>
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <button type="submit">Importar CSV</button>
</form>
<br><br>

<form th:action="@{/libro}"
      method="get">
        <input type="text"
               name="busqueda"
               placeholder="Buscar..."
               th:value="${busqueda}">
        <select name="activo">
            <option value="" th:selected="${activo == null}">
                Todos
            </option>
            <option value="true" th:selected="${activo == 'true'}">
                Activos
            </option>
            <option value="false" th:selected="${activo == 'false'}">
                Inactivos
            </option>
        </select>
        <button type="submit">
            Buscar
        </button>
</form>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Autor</th>
            <th>Género</th>
            <th>Editorial</th>
            <th>ISBN</th>
            <th colspan="3">Acciones</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="libro : ${libros}">
            <td th:text="${libro.idLibro}"></td>
            <td th:text="${libro.titulo}"></td>
            <td th:text="${libro.autor}"></td>
            <td th:text="${libro.genero}"></td>
            <td th:text="${libro.editorial}"></td>
            <td th:text="${libro.isbn}"></td>

            <td>
                <a th:href="@{/libro/editar/{id}(id=${libro.idLibro})}">
                    <button>✏ Editar</button>
                </a>
            </td>
            <td>
                <form th:action="@{/libro/estado/{id}(id=${libro.idLibro})}"
                      method="post">
                    <button type="submit"
                            th:text="${libro.activo} ? 'Dar de baja' : 'Rehabilitar'">
                    </button>
                </form>
            </td>
            <td>
                <a th:href="@{/libro/consultar/{id}(id=${libro.idLibro})}">
                    <button>Consultar</button>
                </a>
            </td>
        </tr>
    </tbody>
</table>
<div>

    <a class='boton'
        th:if="${pagina.hasPrevious()}"
       th:href="@{/libro(
            page=${pagina.number - 1},
            busqueda=${busqueda}
       )}">
        Anterior
    </a>

    <span th:text="${pagina.number + 1}"></span>

    <a  class='boton'
        th:if="${pagina.hasNext()}"
       th:href="@{/libro(
            page=${pagina.number + 1},
            busqueda=${busqueda}
       )}">
        Siguiente
    </a>

</div>
<a href="/">
    <button class="boton">🏠 Inicio</button>
</a>

</body>
</html>
