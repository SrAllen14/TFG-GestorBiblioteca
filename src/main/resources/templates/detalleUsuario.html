<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle Usuario</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">📚 Biblioteca MVC</a>
    </div>
</nav>

<div class="container py-5">

    <!-- TÍTULO -->
    <div class="mb-4">
        <h1 class="fw-bold">
            <i class="bi bi-person-circle"></i>
            Detalle de Usuario
        </h1>
    </div>

    <!-- DATOS USUARIO -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">

            <h4 class="fw-bold mb-3">Información del usuario</h4>

            <div class="row g-3">

                <div class="col-md-4">
                    <p><strong>ID:</strong> <span th:text="${usuario.idUsuario}"></span></p>
                </div>

                <div class="col-md-4">
                    <p><strong>Nombre:</strong> <span th:text="${usuario.nombre}"></span></p>
                </div>

                <div class="col-md-4">
                    <p><strong>Apellido 1:</strong> <span th:text="${usuario.apellido1}"></span></p>
                </div>

                <div class="col-md-4">
                    <p><strong>Apellido 2:</strong> <span th:text="${usuario.apellido2}"></span></p>
                </div>

                <div class="col-md-4">
                    <p><strong>Username:</strong> <span th:text="${usuario.username}"></span></p>
                </div>

                <div class="col-md-4">
                    <p><strong>Rol:</strong> 
                        <span class="badge bg-primary" th:text="${usuario.rol}"></span>
                    </p>
                </div>

                <div class="col-md-4">
                    <p>
                        <strong>Estado:</strong>

                        <span th:if="${usuario.activo}" class="badge bg-success">
                            Activo
                        </span>

                        <span th:unless="${usuario.activo}" class="badge bg-secondary">
                            Inactivo
                        </span>
                    </p>
                </div>

            </div>

        </div>
    </div>

    <!-- PRÉSTAMOS -->
    <div class="card shadow-sm border-0">

        <div class="card-body">

            <h4 class="fw-bold mb-3">Préstamos del usuario</h4>

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Ejemplar</th>
                        <th>Libro</th>
                        <th>Inicio</th>
                        <th>Fin</th>
                        <th>Devolución</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="prestamo : ${prestamos}">

                        <td th:text="${prestamo.idPrestamo}"></td>

                        <td th:text="${prestamo.ejemplar.codigo}"></td>

                        <td th:text="${prestamo.ejemplar.libro.titulo}"></td>

                        <td th:text="${#temporals.format(prestamo.fechaInicio, 'dd-MM-yyyy')}"></td>

                        <td th:text="${#temporals.format(prestamo.fechaFin, 'dd-MM-yyyy')}"></td>

                        <td th:if="${prestamo.fechaDevolucion != null}" th:text="${#temporals.format(prestamo.fechaDevolucion, 'dd-MM-yyyy')}"></td>
                        <td th:if="${prestamo.fechaDevolucion == null}">No se ha devuelto</td>
                        <td>
                            <span th:if="${prestamo.fechaDevolucion == null}"
                                  class="badge bg-warning text-dark">
                                Activo
                            </span>

                            <span th:unless="${prestamo.fechaDevolucion == null}"
                                  class="badge bg-success">
                                Finalizado
                            </span>
                        </td>
                        <td>
                            <a th:if="${prestamo.fechaDevolucion == null}"
                                th:href="@{/prestamo/consultar/{id}(id=${prestamo.idPrestamo})}"
                                class="btn btn-info btn-sm text-white">

                                 <i class="bi bi-eye"></i>
                             </a>
                        </td> 
                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- VOLVER -->
    <div class="text-center mt-4">
        <a href="/usuario" class="btn btn-dark">
            <i class="bi bi-arrow-left"></i>
            Volver
        </a>
    </div>

</div>

</body>
</html>
