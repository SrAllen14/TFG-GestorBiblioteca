<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Usuarios</title>
    
    <style>

        body{
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th{
            background-color: lightgray;
        }

        .boton{
            padding: 10px 15px;
            background-color: #2d89ef;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

    </style>
</head>
<body>

<h1>👤 Lista de Usuarios</h1>

<br>

<a th:href="@{/usuario/crear}">
    <button class="boton">Registrar Usuario</button>
</a>

<form th:action="@{/libro}"
      method="get">
        <input type="text"
               name="busqueda"
               placeholder="Buscar..."
               th:value="${busqueda}">
        <select name="activo">
            <option value="" th:selected="${activo == null}">
                Todos
            </option>
            <option value="true" th:selected="${activo == 'true'}">
                Activos
            </option>
            <option value="false" th:selected="${activo == 'false'}">
                Inactivos
            </option>
        </select>
        <button type="submit">
            Buscar
        </button>
</form>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido 1</th>
            <th>Apellido 2</th>
            <th>Username</th>
            <th>Rol</th>
            <th colspan="2">Acción</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="usuario : ${usuarios}">
            <td th:text="${usuario.idUsuario}"></td>
            <td th:text="${usuario.nombre}"></td>
            <td th:text="${usuario.apellido1}"></td>
            <td th:text="${usuario.apellido2}"></td>
            <td th:text="${usuario.username}"></td>
            <td th:text="${usuario.rol}"></td>
            <td>
                <a th:href="@{/usuario/editar/{id}(id=${usuario.idUsuario})}">
                    <button>Editar</button>
                </a>
            </td>
            <td>
                <form th:action="@{/usuario/estado/{id}(id=${usuario.idUsuario})}"
                      method="post">

                    <button type="submit"
                            th:text="${usuario.activo} ? 'Dar de baja' : 'Rehabilitar'">
                    </button>

                </form>
            </td>
        </tr>
    </tbody>
</table>
<div th:each="usuarioDisponible : ${usuariosDisponibles}">
    <p th:text="${usuarioDisponible.nombre}"></p>
</div>
<br>

<a href="/">
    <button class="boton">🏠 Inicio</button>
</a>

</body>
</html>
