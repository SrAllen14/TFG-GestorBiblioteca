# Nombre de la aplicaci\u00f3n
spring.application.name=GestorBiblioteca

# Conexi\u00f3n con la base de datos.
spring.datasource.url=jdbc:mysql://localhost:3306/DBGestorBiblioteca
spring.datasource.username=DBUserGestorBiblioteca
spring.datasource.password=paso

# Conexi\u00f3n del driver compatible con MySQL.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraci\u00f3n de dependencia JPA.
spring.jpa.hibernate.ddl-auto=update